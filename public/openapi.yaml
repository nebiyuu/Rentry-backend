      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, description, category, price, dailyRate]
              properties:
                name:
                  type: string
                description:
                  type: string
                category:
                  type: string
                condition:
                  type: string
                  enum: [new, used, refurbished]
                  default: new
                price:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                dailyRate:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                penaltyRate:
                  type: number
                  default: 0.00
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Up to 10 image files
                ownerId:
                  type: string
                  format: uuid
                  description: Admin only - assign to specific seller
      responses:
        "201":
          description: Rental product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      product:
                        $ref: "#/components/schemas/Product"
                      rentable:
                        $ref: "#/components/schemas/Rentable"
        "400":
