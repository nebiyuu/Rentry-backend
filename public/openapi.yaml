          schema:
            type: string
          description: Rental Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum: [pending, active, completed, cancelled, overdue]
                notes:
                  type: string
                  maxLength: 1000
      responses:
        "200":
          description: Rental order updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/RentalOrder"
        "400":
          description: Product is not available for the selected dates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: You do not have permission to update this rental order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Rental order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"
    delete:
      tags: [Rental Orders]
      summary: Delete rental order
      description: Deletes a rental order. Only allowed for pending orders.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Rental Order ID
      responses:
        "200":
          description: Rental order deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: Rental order deleted successfully
        "400":
          description: Cannot delete rental order that is not pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: You do not have permission to delete this rental order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Rental order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  # ─── Payments ──────────────────────────────────────────────
  /api/payments/initiate:
    post:
      tags: [Payments]
      summary: Initiate payment
      description: Initiates payment with Chapa for a specific order. Creates payment record and returns checkout URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId]
              properties:
                orderId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Payment initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkoutUrl:
                    type: string
                  hasTrial:
                    type: boolean
        "400":
          description: orderId required or order not payable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/payments/verify:
    post:
      tags: [Payments]
      summary: Verify payment (webhook)
      description: Chapa webhook endpoint for payment verification. Also handles browser redirects from payment completion.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trx_ref:
                  type: string
                  description: Chapa transaction reference (required)
                ref_id:
                  type: string
                  description: Chapa reference ID
                status:
                  type: string
                  description: Payment status from Chapa
      parameters:
        - name: trx_ref
          in: query
          required: false
          schema:
            type: string
          description: Alternative - transaction reference as query param
        - name: tx_ref
          in: query
          required: false
          schema:
            type: string
          description: Alternative transaction reference field
      responses:
        "302":
          description: Redirect to success/failure page
          headers:
            Location:
              schema:
                type: string
                example: http://localhost:3000/payment-success
        "400":
          description: Transaction reference required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/payments/verifyy:
    get:
      tags: [Payments]
      summary: Payment redirect handler
      description: Browser redirect endpoint after payment completion. Simply redirects to success page.
      security: []
      responses:
        "302":
          description: Redirect to success page
          headers:
            Location:
              schema:
                type: string
                example: http://localhost:3000/payment-success

  /api/payments/status:
    get:
      tags: [Payments]
      summary: Check payment status
      description: Checks the current status of a payment using transaction reference.
      security: []
      parameters:
        - name: txRef
          in: query
          required: true
          schema:
            type: string
          description: Chapa transaction reference
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment:
                    $ref: "#/components/schemas/PaymentStatus"
                  order:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [pending, trial_active, paid, returned, cancelled]
                      trialEndsAt:
                        type: string
                        format: date-time
                        nullable: true
                      hasTrial:
                        type: boolean
        "400":
          description: Transaction reference (txRef) is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Payment or order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  # ─── Admin ─────────────────────────────────────────────────
  /api/admin/sellers/{id}/approve:
    patch:
      tags: [Admin]
      summary: Approve a seller
      description: Approve a seller account. Only admins can approve sellers.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Seller ID
      responses:
        "200":
          description: Seller approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Seller approved successfully
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          description: Seller not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

# ─── Components ───────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token obtained from login or email verification.
        Include as: `Authorization: Bearer <token>`

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
        error:
          type: string

    ValidationError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: array
          items:
            type: object

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [buyer, seller, admin]

    Buyer:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        username:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        emailVerified:
          type: boolean
        profilePic:
          type: string

    Seller:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phoneNumber:
          type: string
        storeName:
          type: string
        username:
          type: string
        email:
          type: string
        address:
          type: string
        approved:
          type: boolean
        emailVerified:
          type: boolean
        profilePic:
          type: string
        license:
          type: string

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        condition:
          type: string
          enum: [new, used, refurbished]
        price:
          type: number
        images:
          type: array
          items:
            type: string
        ownerId:
          type: string
        deleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TrialPolicy:
      type: object
      properties:
        id:
          type: string
        productId:
          type: string
        trialDays:
          type: integer
        penaltyType:
          type: string
        penaltyValue:
          type: number
        returnWindowHours:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TrialPolicyInput:
      type: object
      properties:
        trialDays:
          type: integer
          minimum: 1
        penaltyType:
          type: string
          example: flat
        penaltyValue:
          type: number
          minimum: 0
        returnWindowHours:
          type: integer
          minimum: 1

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        buyerId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, trial_active, paid, returned, cancelled, return_requested, disputed]
        trialStartedAt:
          type: string
          format: date-time
        trialEndsAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Return:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        returnToken:
          type: string
        status:
          type: string
          enum: [pending, confirmed, defect_claimed, expired]
        requestedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        hasDefect:
          type: boolean
        defectDescription:
          type: string
        defectPhotoUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ReturnDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        returnToken:
          type: string
        status:
          type: string
          enum: [pending, confirmed, defect_claimed, expired]
        requestedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        scannedAt:
          type: string
          format: date-time
        defectPhotoUrl:
          type: string
        defectDescription:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        order:
          $ref: "#/components/schemas/Order"

    Rentable:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        dailyRate:
          type: number
        penaltyRate:
          type: number
        available:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RentalOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        rentableId:
          type: string
          format: uuid
        renterId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, active, completed, cancelled, overdue]
        totalCost:
          type: number
        depositAmount:
          type: number
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaymentStatus:
      type: object
      properties:
        status:
          type: string
          enum: [pending, released_to_seller, held_in_escrow, failed]
        amount:
          type: number
        currency:
          type: string
        paidAt:
          type: string
          format: date-time
          nullable: true
        chapaTxRef:
          type: string
