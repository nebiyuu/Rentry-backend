openapi: "3.0.3"
info:
  title: Rentry API
  version: "1.0.0"
  description: |
    Complete API documentation for the Rentry e-commerce platform.
    Manage products, users, orders, rentals, and payments with our comprehensive REST API.
servers:
  - url: https://rentry.servequake.com
    description: Production EC2 backend

tags:
  - name: Health
    description: Health check endpoint
  - name: Authentication & Users
    description: User login, email verification, OTP, and account deletion
  - name: Buyers
    description: Buyer registration and CRUD operations
  - name: Sellers
    description: Seller registration, listing, and management
  - name: Products
    description: Product CRUD with optional trial policies
  - name: Trial Policies
    description: Trial policy management for products
  - name: Orders
    description: Order creation, listing, and status management
  - name: Returns
    description: Return initiation, QR scanning, and return queries
  - name: Rental Products
    description: Rentable product CRUD and listing
  - name: Rental Orders
    description: Rental order creation and management
  - name: Payments
    description: Payment initiation, webhook, and status checks
  - name: Admin
    description: Admin-only endpoints

security:
  - BearerAuth: []

paths:
  # ─── Health ─────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns the operational status of the API.
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number

  # ─── Authentication & Users ────────────────────────────────
  /api/users/login:
    post:
      tags: [Authentication & Users]
      summary: Universal login
      description: Login for buyer, seller, and admin. Role resolved from User.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: username or email
                password:
                  type: string
                  description: user password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          description: Email not verified or seller not approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/users/resend-otp:
    post:
      tags: [Authentication & Users]
      summary: Resend verification OTP
      description: Resends a new verification code to buyer or seller email.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: OTP resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OTP resent to buyer/seller email
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/users/verify-email:
    post:
      tags: [Authentication & Users]
      summary: Verify email with OTP
      description: Verifies the code, marks emailVerified, ensures a User exists, and returns JWT.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  description: 6-digit verification code
      responses:
        "200":
          description: Email verified or already verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Validation errors (email/otp required, no OTP pending, OTP expired, invalid OTP)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Too many attempts. Request a new OTP

  /api/users/{id}:
    delete:
      tags: [Authentication & Users]
      summary: Delete user
      description: Deletes the user and related Seller/Buyer records. Only the same user or an admin can perform this.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User and related records deleted
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  # ─── Buyers ────────────────────────────────────────────────
  /api/buyers/register:
    post:
      tags: [Buyers]
      summary: Register a buyer
      description: Registers a buyer with a profile picture and sends OTP.
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [firstName, lastName, username, email, password, profilePic]
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                username:
                  type: string
                email:
                  type: string
                  format: email
                phoneNumber:
                  type: string
                password:
                  type: string
                profilePic:
                  type: string
                  format: binary
                  description: Required image file
      responses:
        "201":
          description: Buyer registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  buyer:
                    $ref: "#/components/schemas/Buyer"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/buyers:
    get:
      tags: [Buyers]
      summary: List buyers
      responses:
        "200":
          description: List of buyers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Buyer"
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/buyers/{id}:
    get:
      tags: [Buyers]
      summary: Get buyer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Buyer ID
      responses:
        "200":
          description: Buyer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Buyer"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/ServerError"
    patch:
      tags: [Buyers]
      summary: Update buyer (self/admin)
      description: Update buyer fields. Only self or admin.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Buyer ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                phoneNumber:
                  type: string
      responses:
        "200":
          description: Buyer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Buyer"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/ServerError"
    delete:
      tags: [Buyers]
      summary: Delete buyer (self/admin)
      description: Delete buyer. Only self or admin.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Buyer ID
      responses:
        "200":
          description: Buyer deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  # ─── Sellers ───────────────────────────────────────────────
  /api/sellers/register:
    post:
      tags: [Sellers]
      summary: Register a seller
      description: Registers a seller with license and profile picture uploads, then sends OTP. Login requires emailVerified=true and approved=true.
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [firstName, lastName, username, email, password, license, profilePic]
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                address:
                  type: string
                phoneNumber:
                  type: string
                storeName:
                  type: string
                license:
                  type: string
                  format: binary
                  description: Required image file
                profilePic:
                  type: string
                  format: binary
                  description: Required image file
      responses:
        "201":
          description: Seller registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  seller:
                    $ref: "#/components/schemas/Seller"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/sellers:
    get:
      tags: [Sellers]
      summary: Get all sellers (admin only)
      description: Returns all sellers. Admin only.
      responses:
        "200":
          description: Sellers retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  sellers:
                    type: array
                    items:
                      $ref: "#/components/schemas/Seller"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/sellers/{id}:
    get:
      tags: [Sellers]
      summary: Get seller by ID
      description: Get seller by ID. Authenticated users only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Seller ID
      responses:
        "200":
          description: Seller retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  seller:
                    $ref: "#/components/schemas/Seller"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/ServerError"
    put:
      tags: [Sellers]
      summary: Update seller
      description: Update seller information. Authenticated users only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Seller ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                address:
                  type: string
                license:
                  type: string
                approved:
                  type: boolean
      responses:
        "200":
          description: Seller updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  seller:
                    $ref: "#/components/schemas/Seller"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/ServerError"
    patch:
      tags: [Sellers]
      summary: Update seller (partial)
      description: Partially update seller information. Authenticated users only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Seller ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                address:
                  type: string
                license:
                  type: string
                approved:
                  type: boolean
      responses:
        "200":
          description: Seller updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  seller:
                    $ref: "#/components/schemas/Seller"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  # ─── Products ──────────────────────────────────────────────
  /api/products:
    get:
      tags: [Products]
      summary: List all products
      description: Lists all products. Supports filtering by category. Admins can see soft-deleted products as well.
      security: []
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by category (e.g. "Mobile Phones & Tablets")
      responses:
        "200":
          description: Products retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
        "500":
          description: Error retrieving products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  error:
                    type: string
    post:
      tags: [Products]
      summary: Create a product
      description: Creates a new product. Only authenticated sellers or admins can create products.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, description, category, price]
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 100
                description:
                  type: string
                  minLength: 10
                category:
                  type: string
                condition:
                  type: string
                  enum: [new, used, refurbished]
                  default: new
                price:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                images:
                  type: array
                  items:
                    type: string
                  description: Array of image URLs
                ownerId:
                  type: number
                  description: Admin only - assign product to specific seller
                trialPolicy:
                  $ref: "#/components/schemas/TrialPolicyInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Product"
        "400":
          description: Validation error or image validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Only sellers and admins can create products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error creating product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/products/{id}:
    get:
      tags: [Products]
      summary: Get product by ID
      description: Get a specific product by ID. Admins can retrieve soft-deleted products.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product ID
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Error retrieving product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [Products]
      summary: Update product
      description: Partially updates an existing product. Only the product owner or admin can update it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 100
                description:
                  type: string
                  minLength: 10
                category:
                  type: string
                condition:
                  type: string
                  enum: [new, used, refurbished]
                price:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                images:
                  type: array
                  items:
                    type: string
                ownerId:
                  type: number
                  description: Admin only - transfer product ownership
                trialPolicy:
                  $ref: "#/components/schemas/TrialPolicyInput"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      product:
                        $ref: "#/components/schemas/Product"
                      trialPolicy:
                        $ref: "#/components/schemas/TrialPolicy"
        "400":
          description: Validation error or image validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          description: Not authorized to update this product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"
    delete:
      tags: [Products]
      summary: Soft delete product
      description: Soft deletes a product. Only the product owner or admin can delete it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product ID
      responses:
        "200":
          description: Product deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: Product deleted successfully
        "401":
          $ref: "#/components/responses/Error"
        "403":
          description: Not authorized to delete this product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/ServerError"

  # ─── Trial Policies ────────────────────────────────────────
  /api/products/{id}/trial-policy:
    post:
      tags: [Trial Policies]
      summary: Create trial policy
      description: Creates a trial policy for a product. Only authenticated sellers or admins can create trial policies.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trial_days, return_window_hours]
              properties:
                trial_days:
                  type: integer
                  minimum: 1
                  maximum: 365
                return_window_hours:
                  type: integer
                  minimum: 1
                  maximum: 8760
      responses:
        "201":
          description: Trial policy created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  trialPolicy:
                    $ref: "#/components/schemas/TrialPolicy"
        "400":
          description: Validation error, product not found, or trial policy already exists
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      errors:
                        type: array
                        items:
                          type: object
                  - type: object
                    properties:
                      error:
                        type: string
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/ServerError"
    patch:
      tags: [Trial Policies]
      summary: Update trial policy
      description: Updates an existing trial policy. Only the product owner or admin can update it. All fields are optional.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trial_days:
                  type: integer
                  minimum: 1
                  maximum: 365
                return_window_hours:
                  type: integer
                  minimum: 1
                  maximum: 8760
      responses:
        "200":
          description: Trial policy updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  trialPolicy:
                    $ref: "#/components/schemas/TrialPolicy"
        "400":
          description: Validation errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Error"
        "404":
          description: Trial policy not found for this product
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "500":
          $ref: "#/components/responses/ServerError"
    delete:
      tags: [Trial Policies]
      summary: Disable trial policy
      description: Soft deletes/disables a trial policy. Only the product owner or admin can delete it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product ID
      responses:
        "200":
          description: Trial policy disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Trial policy disabled successfully
        "401":
          $ref: "#/components/responses/Error"
        "404":
          description: Trial policy not found for this product
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "500":
          $ref: "#/components/responses/ServerError"
    get:
      tags: [Trial Policies]
      summary: Get trial policy
      description: Gets the trial policy for a specific product.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product ID
      responses:
        "200":
          description: Trial policy retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  trialPolicy:
                    $ref: "#/components/schemas/TrialPolicy"
        "404":
          description: Trial policy not found for this product
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "500":
          $ref: "#/components/responses/ServerError"

  # ─── Orders ────────────────────────────────────────────────
  /api/orders:
    post:
      tags: [Orders]
      summary: Create an order
      description: Creates a new order. Only authenticated buyers can create orders.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId]
              properties:
                productId:
                  type: string
                  format: uuid
                trialStartedAt:
                  type: string
                  format: date-time
                trialEndsAt:
                  type: string
